<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Payment | NeXioa</title>
<link rel="icon" type="jpg" href="nexioa final logo2.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="payment.css">

</head>
<body>
<header class="header">
  <div class="logo-wrapper">
    <img src="nexioa final logo2.jpg" class="brand-icon">
    <div class="logo-text-block">
      <div class="logo">
        <span class="logo-text1">Ne</span><span class="logo-x">X</span><span class="logo-text">ioa</span>
      </div>
      <span class="tagline">Powering Future Skills</span>
    </div>
  </div>

  <div class="secure-badge">🔒 100% Secure Checkout</div>
</header>



<section class="payment-container fade-in">

  <div class="order-summary">
    <h2>Order Summary</h2>
    <div class="summary-box">
      <p>Selected Course</p>
      <h3 id="courseName">Loading...</h3>
      <div class="price-row">
        <span>Total Amount</span>
        <span>₹<span id="totalAmount">0</span></span>
      </div>
    </div>
  </div>

  <div class="payment-box">
    <h2>Complete Your Payment</h2>

    <form id="paymentForm">

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="name" required>
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" required>
      </div>

      <div class="input-group">
        <label>Mobile Number</label>
        <input type="tel" id="phone" required>
      </div>

      <button type="submit" class="pay-btn">
        Pay ₹<span id="payAmount">0</span> Now 🚀
      </button>

    </form>

    <div class="trust-info">
      <p>✔ Instant Access After Payment</p>
      <p>✔ Lifetime Course Access</p>
      <p>✔ Verified Certificate</p>
    </div>

  </div>

</section>

<footer>
  © 2026 NeXioa Learners. All rights reserved.
</footer>

<script src="payment.js"></script>

</body>
</html>
